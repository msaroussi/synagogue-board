<div class="clock-center">
  <div class="day-name">{{ dayName() }}</div>
  <div class="clock-display" dir="ltr">
    <span class="hours">{{ clockHr() }}</span>
    <span class="colon">:</span>
    <span class="minutes">{{ clockMin() }}</span>
    <span class="colon">:</span>
    <span class="seconds">{{ clockSec() }}</span>
  </div>
</div>
