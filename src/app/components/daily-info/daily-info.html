<div class="middle-right">
  <div class="parasha-section">
    <div class="label" [style.font-size]="parashaLabelFontSize()">פרשת השבוע</div>
    <div class="value" [style.font-size]="parashaValueFontSize()">{{ parashaName() }}</div>
  </div>
  @if (showOmer()) {
    <div class="info-line" [style.font-size]="infoLineFontSize()">ספירת העומר: <span class="info-value">{{ omerCount() }}</span></div>
  }
  <div class="info-line" [style.font-size]="infoLineFontSize()">{{ seasonWind() }}</div>
  <div class="info-line" [style.font-size]="infoLineFontSize()">דף היומי: <span class="info-value">{{ dafYomi() }}</span></div>
</div>
